name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Lint
      run: |
        flake8 .

    - name: Run tests
      run: |
        pytest

    - name: Docker login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/internal-utility-service:latest .

    - name: Push image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/internal-utility-service:latest
